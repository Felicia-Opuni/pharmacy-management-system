<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — PharmaCare System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">💊</div>
      <h1>PharmaCare System</h1>
      <p>Integrated Pharmacy Management</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="staffEmail">Staff Email</label>
        <input class="form-control" type="email" id="staffEmail" placeholder="e.g. kofi@pharmacy.gh" value="kofi@pharmacy.gh" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Enter your password" value="••••••••" />
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2" id="loginBtn">🔐 &nbsp;Login to System</button>
      <p id="loginError" style="display:none; color:var(--danger); font-size:0.82rem; margin-top:10px;"></p>
    </form>
  </div>
</div>
<script src="./js/utils.js"></script>
<script src="./js/auth.js"></script>
</body>
</html>
